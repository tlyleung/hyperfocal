<figure class="aspect-[3/2]">
  <img
    class="h-full w-full cursor-zoom-in object-fill focus:outline-none"
    src="{{ include.src }}"
    alt="{{ include.alt }}"
    data-exif="{{ include.exif }}"
    data-orientation="landscape"
    tabindex="-1"
    width="2048"
    height="1365"
    loading="lazy"
  />
</figure>
